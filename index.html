<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0b0d10">
<title>Intervalometer — Time-lapse</title>

<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Time-lapse">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <div id="camWrap">
    <video id="cam" playsinline autoplay muted></video>
    <div id="vignette"></div>
    <div id="flash"></div>

    <div id="topBar">
      <div id="eyebrow">TIME-LAPSE</div>
      <button id="switchCamBtn" class="iconBtn" title="Přepnout kameru">⟲</button>
    </div>

    <div id="dialWrap">
      <svg id="dial" viewBox="0 0 200 200">
        <circle id="dialTrack" cx="100" cy="100" r="88"></circle>
        <circle id="dialProgress" cx="100" cy="100" r="88"></circle>
      </svg>
      <div id="dialCenter">
        <div id="frameCount">0</div>
        <div id="frameLabel">snímků</div>
      </div>
    </div>

    <div id="readouts">
      <div class="readout">
        <div class="rLabel">UPLYNULO</div>
        <div class="rValue" id="elapsedVal">00:00:00</div>
      </div>
      <div class="readout">
        <div class="rLabel">ZBÝVÁ</div>
        <div class="rValue" id="remainingVal">—</div>
      </div>
      <div class="readout">
        <div class="rLabel">VÝSTUP</div>
        <div class="rValue" id="outputVal">0:00 s</div>
      </div>
    </div>
  </div>

  <div id="controls">

    <div class="modeSwitch">
      <button class="modeBtn active" data-mode="count">Počet snímků</button>
      <button class="modeBtn" data-mode="duration">Doba trvání</button>
      <button class="modeBtn" data-mode="infinite">Bez limitu</button>
    </div>

    <div class="row">
      <label for="intervalInput">Interval mezi snímky (s)</label>
      <input type="number" id="intervalInput" min="0.5" step="0.5" value="5">
    </div>

    <div class="row" id="countRow">
      <label for="countInput">Cílový počet snímků</label>
      <input type="number" id="countInput" min="1" step="1" value="200">
    </div>

    <div class="row" id="durationRow" style="display:none">
      <label for="durationInput">Doba trvání (min)</label>
      <input type="number" id="durationInput" min="1" step="1" value="30">
    </div>

    <div class="row">
      <label for="aspectSelect">Poměr stran ořezu</label>
      <select id="aspectSelect">
        <option value="native" selected>Nativní (senzor)</option>
        <option value="3:2">Filmový (3:2)</option>
        <option value="16:9">Širokoúhlý (16:9)</option>
      </select>
    </div>

    <div class="row">
      <label for="resSelect">Rozlišení snímků</label>
      <select id="resSelect">
        <option value="full">Plné (nejostřejší)</option>
        <option value="hd" selected>Střední — 1280px</option>
        <option value="sd">Nízké — 854px</option>
      </select>
    </div>

    <div class="row">
      <label for="fpsInput">Snímková frekvence (FPS)</label>
      <input type="number" id="fpsInput" min="1" max="60" value="24">
    </div>

    <div class="row toggleRow">
      <label for="wakeToggle">Nenechat obrazovku zhasnout</label>
      <input type="checkbox" id="wakeToggle" checked>
    </div>

    <button id="startBtn" class="primaryBtn">Spustit time-lapse</button>

    <div class="row buttonsRow">
      <button id="zipBtn" class="smallBtn">Stáhnout snímky (ZIP)</button>
      <button id="videoBtn" class="smallBtn">Sestavit video</button>
    </div>
    <div class="row buttonsRow">
      <button id="clearBtn" class="smallBtn danger">Smazat vše</button>
    </div>

    <p id="hint"></p>
  </div>

</div>

<script src="jszip.min.js"></script>
<script src="app.js"></script>
</body>
</html>
